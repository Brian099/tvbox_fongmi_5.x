name: Build Android App

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
      - '*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configure Keystore and local.properties
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "Using production signing key from secrets..."
            echo "$SIGNING_KEY" | base64 --decode > app/release.jks
            echo "storeFile=release.jks" >> local.properties
            echo "keyAlias=$KEY_ALIAS" >> local.properties
            echo "storePassword=$STORE_PASSWORD" >> local.properties
            echo "keyPassword=$KEY_PASSWORD" >> local.properties
          else
            echo "No signing key secret detected. Generating mock keystore for release build..."
            keytool -genkeypair -v -keystore app/release.jks -alias mock -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Mock, O=Mock, C=US" -storepass mock_password -keypass mock_password
            echo "storeFile=release.jks" >> local.properties
            echo "keyAlias=mock" >> local.properties
            echo "storePassword=mock_password" >> local.properties
            echo "keyPassword=mock_password" >> local.properties
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: TV-fongmi-apks
          path: Release/apk/*.apk

      - name: Create Release and Upload APKs
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Release/apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
